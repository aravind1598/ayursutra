<!DOCTYPE html>
<html>
<head>
<title>AyurSutra</title>

<style>
body { margin:0; font-family:Arial; }

/* LOGIN */
#loginPage { text-align:center; margin-top:80px; }

/* SIDEBAR */
.sidebar {
    width:200px;
    height:100vh;
    background:#333;
    color:#fff;
    float:left;
    padding:10px;
}
.sidebar ul { list-style:none; padding:0; }
.sidebar li { padding:10px; cursor:pointer; }
.sidebar li:hover { background:#555; }

/* CONTENT */
.content { margin-left:210px; padding:20px; }

.section { display:none; }
.active { display:block; }

.box {
    border:1px solid #ccc;
    padding:15px;
    margin-bottom:10px;
}

.footer {
    margin-left:210px;
    text-align:center;
    padding:10px;
    background:#f2f2f2;
}
</style>
</head>

<body>

<!-- LOGIN + REGISTER -->
<div id="loginPage">
    <h2>Login</h2>
    <input id="username" placeholder="Username"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>
    <button onclick="login()">Login</button>

    <h3>Create Account</h3>
    <input id="newUser" placeholder="New Username"><br><br>
    <input id="newPass" type="password" placeholder="New Password"><br><br>
    <button onclick="register()">Register</button>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none;">

<div class="sidebar">
    <h2>AyurSutra</h2>
    <ul>
        <li onclick="showPage('dashboard')">Dashboard</li>
        <li onclick="showPage('profile')">Profile</li>
        <li onclick="showPage('reports')">Reports</li>
        <li onclick="logout()">Logout</li>
    </ul>
</div>

<div class="content">

<div id="dashboard" class="section active">
    <h1>Dashboard</h1>
    <div class="box">Patient Dashboard</div>
    <div class="box">Scheduling Calendar</div>
    <div class="box">Appointment Booking</div>
</div>

<div id="profile" class="section">
    <h1>Profile</h1>
    <div class="box">
        Username: <span id="pUser"></span><br>
        Role: Patient<br>
        Status: Active
    </div>
</div>

<div id="reports" class="section">
    <h1>Reports</h1>
    <div class="box">Reports & Analytics</div>
</div>

</div>

<div class="footer">
    Created by Aravindhan, Rithik Prathap
</div>

</div>

<script>
function getUsers(){
    return JSON.parse(localStorage.getItem("users")) || [];
}

function saveUsers(users){
    localStorage.setItem("users", JSON.stringify(users));
}

function register(){
    let u = document.getElementById("newUser").value.trim();
    let p = document.getElementById("newPass").value.trim();

    if(!u || !p){ alert("Enter details"); return; }

    let users = getUsers();

    if(users.find(x => x.username === u)){
        alert("User already exists");
        return;
    }

    users.push({username:u, password:p});
    saveUsers(users);

    alert("Account created");
}

function login(){
    let u = document.getElementById("username").value.trim();
    let p = document.getElementById("password").value.trim();

    let users = getUsers();

    let user = users.find(x => x.username === u && x.password === p);

    if(user){
        localStorage.setItem("loggedUser", u);
        document.getElementById("loginPage").style.display="none";
        document.getElementById("app").style.display="block";
        document.getElementById("pUser").innerText=u;
    } else {
        alert("Invalid login");
    }
}

function logout(){
    localStorage.removeItem("loggedUser");
    location.reload();
}

function showPage(id){
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

window.onload=function(){
    let u = localStorage.getItem("loggedUser");
    if(u){
        document.getElementById("loginPage").style.display="none";
        document.getElementById("app").style.display="block";
        document.getElementById("pUser").innerText=u;
    }
};
</script>

</body>
</html>
