<body>

<!-- LOGIN PAGE -->
<div id="loginPage" style="text-align:center; margin-top:100px;">
    <h2>Login</h2>
    <input id="username" placeholder="Username"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>
    <button onclick="login()">Login</button>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none;">

    <div class="sidebar">
        <h2>AyurSutra</h2>
        <ul>
            <li onclick="showPage('dashboard')">Dashboard</li>
            <li onclick="showPage('profile')">Profile</li>
            <li onclick="logout()">Logout</li>
        </ul>
    </div>

    <div class="content">

        <!-- DASHBOARD -->
        <div id="dashboard" class="section active">
            <h1>Dashboard</h1>
            <div class="box">
                <p>Welcome to AyurSutra system</p>
            </div>
        </div>

        <!-- PROFILE -->
        <div id="profile" class="section">
            <h1>User Profile</h1>
            <div class="box">
                <p><b>Username:</b> <span id="pUser"></span></p>
                <p><b>Role:</b> Patient</p>
                <p><b>Status:</b> Active</p>
            </div>
        </div>

    </div>

</div>

<div class="footer">
    <p>Created by Aravindhan, Rithik Prathap</p>
</div>
