<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AyurSutra | Elite Admin Systems</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #d4af37;
            --bg-deep: #050505;
            --kg-blue: #003399;
            --kg-light-blue: #eef2f9;
            --sidebar-width: 260px;
            --emerald: #00ffaa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; transition: 0.5s; }

        /* --- LOGIN SECTION STYLES --- */
        #login-screen {
            background: var(--bg-deep);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at center, rgba(212, 175, 55, 0.05) 0%, transparent 70%);
            position: relative;
            z-index: 100;
        }

        .login-box {
            background: #0f0f0f;
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 50px 40px;
            border-radius: 40px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        .logo { font-family: 'Syne', sans-serif; font-size: 32px; background: linear-gradient(to bottom, #fff, var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 40px; }
        
        .field { margin-bottom: 25px; text-align: left; }
        .field label { display: block; font-size: 11px; color: #666; margin-bottom: 8px; text-transform: uppercase; font-weight: 700; }
        
        input {
            width: 100%; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 18px 25px; border-radius: 20px; color: #fff; outline: none; transition: 0.4s;
        }
        input:focus { border-color: var(--gold); background: rgba(212, 175, 55, 0.05); }

        .gold-btn {
            width: 100%; padding: 20px; background: linear-gradient(135deg, #fceabb 0%, #fccd4d 50%, #f8b500 100%);
            border: none; border-radius: 20px; font-weight: 800; cursor: pointer; transition: 0.3s;
        }

        #error-msg { color: #ff4b4b; font-size: 13px; margin-top: 15px; display: none; }

        /* --- DASHBOARD SECTION STYLES --- */
        #dashboard-screen {
            display: none; /* Initially Hidden */
            background-color: #f4f7f6;
            min-height: 100vh;
            width: 100%;
        }

        .sidebar {
            width: var(--sidebar-width); height: 100vh; background: white;
            border-right: 1px solid #ddd; position: fixed; display: flex; flex-direction: column;
        }

        .nav-item {
            padding: 15px 25px; display: flex; align-items: center; color: #555;
            text-decoration: none; font-weight: 500; transition: 0.3s;
        }
        .nav-item i { margin-right: 15px; color: var(--kg-blue); }
        .nav-item.active, .nav-item:hover { background: var(--kg-light-blue); color: var(--kg-blue); border-left: 4px solid var(--kg-blue); }

        .main-content { margin-left: var(--sidebar-width); padding: 30px; width: calc(100% - var(--sidebar-width)); }
        
        .header-bar {
            display: flex; justify-content: space-between; background: white;
            padding: 15px 25px; border-radius: 12px; margin-bottom: 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; display: flex; align-items: center; border-bottom: 3px solid #ddd; cursor: pointer; transition: 0.3s; }
        .stat-card:hover { transform: translateY(-5px); border-bottom-color: var(--kg-blue); }

        .grid-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .grid-item { background: white; border: 1px solid #eee; padding: 25px; text-align: center; border-radius: 12px; cursor: pointer; transition: 0.3s; }
        .grid-item:hover { background: var(--kg-blue); color: white; }
        .grid-item i { font-size: 28px; margin-bottom: 10px; display: block; }

        /* MODAL */
        .modal {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-box { background: white; padding: 30px; border-radius: 15px; width: 450px; position: relative; }
        .detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <div class="logo">AYURSUTRA.</div>
            <div class="field">
                <label>Master ID</label>
                <input type="text" id="user" placeholder="A92" autocomplete="off">
            </div>
            <div class="field">
                <label>Security Code</label>
                <input type="password" id="pass" placeholder="••••">
            </div>
            <button class="gold-btn" onclick="handleAuth()">Authorize Entry</button>
            <p id="error-msg">✕ Authentication Failed. Retry Entry.</p>
        </div>
    </div>

    <div id="dashboard-screen">
        <div class="sidebar">
            <div style="padding: 25px; text-align: center; border-bottom: 2px solid var(--kg-blue);">
                <h2 style="color: var(--kg-blue); font-family: 'Syne';">AYURSUTRA</h2>
            </div>
            <nav style="margin-top: 20px;">
                <a href="#" class="nav-item active"><i class="fas fa-th-large"></i> Dashboard</a>
                <a href="javascript:void(0)" onclick="openRecords('Doctors List')" class="nav-item"><i class="fas fa-user-md"></i> Doctors List</a>
                <a href="javascript:void(0)" onclick="openRecords('Patient Portal')" class="nav-item"><i class="fas fa-procedures"></i> Patient Portal</a>
                <a href="javascript:void(0)" onclick="openRecords('Appointments')" class="nav-item"><i class="fas fa-calendar-check"></i> Appointments</a>
                <a href="#" class="nav-item"><i class="fas fa-sign-out-alt" onclick="location.reload()"></i> Logout</a>
            </nav>
        </div>

        <div class="main-content">
            <div class="header-bar">
                <h2 style="font-size: 18px;">Admin: <span style="color: var(--kg-blue);">Aravind1598</span></h2>
                <div><i class="fas fa-bell"></i></div>
            </div>

            <div class="stats-grid">
                <div class="stat-card" onclick="openRecords('Overall Patient Stats')">
                    <i class="fas fa-users" style="font-size: 25px; margin-right: 15px; color: var(--kg-blue);"></i>
                    <div><h3>1,240</h3><p>Patients</p></div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-user-check" style="font-size: 25px; margin-right: 15px; color: #28a745;"></i>
                    <div><h3>45</h3><p>Doctors Online</p></div>
                </div>
            </div>

            <div style="background: white; padding: 25px; border-radius: 12px;">
                <h3 style="margin-bottom: 20px; color: var(--kg-blue);">Department Access</h3>
                <div class="grid-container">
                    <div class="grid-item" onclick="openRecords('Heart Center')"><i class="fas fa-heartbeat"></i><span>Heart</span></div>
                    <div class="grid-item" onclick="openRecords('Neurology')"><i class="fas fa-brain"></i><span>Neuro</span></div>
                    <div class="grid-item" onclick="openRecords('Orthopedics')"><i class="fas fa-bone"></i><span>Ortho</span></div>
                    <div class="grid-item" onclick="openRecords('Emergency')"><i class="fas fa-ambulance"></i><span>Emergency</span></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="dataModal">
        <div class="modal-box">
            <h2 id="m-title" style="color: var(--kg-blue); border-bottom: 2px solid #eee; padding-bottom: 10px;"></h2>
            <div id="m-body" style="margin-top: 15px;"></div>
            <button onclick="closeModal()" style="margin-top:20px; width:100%; padding:12px; background:var(--kg-blue); color:white; border:none; border-radius:8px; cursor:pointer;">Close</button>
        </div>
    </div>

    <script>
        // Authentication Logic
        function handleAuth() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const btn = document.querySelector('.gold-btn');
            
            if(u === "A92" && p === "1234") {
                btn.innerHTML = "Access Granted...";
                btn.style.background = "#00ffaa";
                setTimeout(() => {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('dashboard-screen').style.display = 'block';
                }, 800);
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        }

        // Data Logic
        const db = {
            "Heart Center": { "HOD": "Dr. Baktha", "Active Cases": "14", "Status": "Stable" },
            "Neurology": { "HOD": "Dr. Rajesh", "Active Cases": "08", "Status": "Busy" },
            "Emergency": { "Ambulances": "4", "Critical Patients": "2", "Alert": "Level 1" },
            "Doctors List": { "Senior": "12", "Junior": "33", "On Call": "5" },
            "Overall Patient Stats": { "Total": "1,240", "Discharged": "89", "Critical": "12" }
        };

        function openRecords(title) {
            document.getElementById('m-title').innerText = title;
            let html = "";
            const data = db[title] || { "Info": "System updating...", "Status": "Processing" };
            for(let key in data) {
                html += `<div class="detail-row"><strong>${key}</strong> <span>${data[key]}</span></div>`;
            }
            document.getElementById('m-body').innerHTML = html;
            document.getElementById('dataModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('dataModal').style.display = 'none'; }
    </script>
</body>
</html>
